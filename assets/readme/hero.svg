<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-labelledby="title desc">
  <title id="title">MyClipboard - история буфера обмена</title>
  <desc id="desc">Локальный clipboard manager для macOS и Windows: копируете - сохраняется на диске, вставляете горячей клавишей. Без облака и аналитики.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0C10"/>
      <stop offset="100%" stop-color="#12141C"/>
    </linearGradient>
    <linearGradient id="clipGlass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2F3D"/>
      <stop offset="100%" stop-color="#171A24"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7B6CFF"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="380" rx="26" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="378" rx="25" fill="none" stroke="#2A2E3A" stroke-width="1"/>
  <g opacity="0.14" fill="none" stroke="#A78BFA" stroke-width="2">
    <rect x="980" y="48" width="160" height="210" rx="18"/>
    <rect x="1032" y="36" width="56" height="28" rx="8"/>
  </g>
  <g id="title-block" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="56" y="78" fill="#8B90A0" font-size="18" letter-spacing="3.2">CLIPBOARD HISTORY  |  LOCAL ONLY</text>
    <text x="56" y="148" fill="#F4F5F7" font-size="64" font-weight="700">MyClipboard</text>
    <text x="56" y="198" fill="#C8CCD8" font-size="24">История буфера обмена на вашем компьютере.</text>
    <text x="56" y="234" fill="#C8CCD8" font-size="24">Без облака, аккаунта и аналитики.</text>
    <g transform="translate(56 278)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">
      <rect width="148" height="40" rx="12" fill="#1A1D28" stroke="#2A2E3A"/>
      <text x="74" y="26" fill="#F4F5F7" text-anchor="middle">macOS 14+</text>
      <rect x="160" width="150" height="40" rx="12" fill="#1A1D28" stroke="#2A2E3A"/>
      <text x="235" y="26" fill="#F4F5F7" text-anchor="middle">Windows 10+</text>
      <rect x="322" width="200" height="40" rx="12" fill="#1A1D28" stroke="#3DDC97" stroke-opacity="0.55"/>
      <text x="422" y="26" fill="#3DDC97" text-anchor="middle">данные локально</text>
    </g>
  </g>
  <g id="project-proof" transform="translate(720 56)">
    <rect width="420" height="268" rx="20" fill="url(#clipGlass)" stroke="#2A2E3A"/>
    <rect x="168" y="-10" width="84" height="28" rx="9" fill="#2A2F3D" stroke="#4A5166"/>
    <circle cx="188" cy="4" r="3" fill="#8B90A0"/>
    <circle cx="210" cy="4" r="3" fill="#8B90A0"/>
    <circle cx="232" cy="4" r="3" fill="#8B90A0"/>
    <text x="28" y="48" fill="#8B90A0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">HISTORY</text>
    <text x="392" y="48" fill="#8B90A0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" text-anchor="end">Cmd+Opt+V</text>
    <rect x="24" y="68" width="372" height="40" rx="10" fill="#0F1118"/>
    <rect x="38" y="82" width="220" height="12" rx="4" fill="#D7DAE3"/>
    <rect x="270" y="82" width="60" height="12" rx="4" fill="#3A3F50"/>
    <rect x="24" y="120" width="372" height="40" rx="10" fill="#0F1118"/>
    <rect x="38" y="134" width="180" height="12" rx="4" fill="#D7DAE3"/>
    <rect x="230" y="134" width="90" height="12" rx="4" fill="#3A3F50"/>
    <rect x="24" y="172" width="372" height="40" rx="10" fill="#0F1118"/>
    <rect x="38" y="186" width="150" height="12" rx="4" fill="#D7DAE3"/>
    <rect x="24" y="224" width="372" height="40" rx="10" fill="#1A1730" stroke="#7B6CFF" stroke-width="1.5"/>
    <rect x="38" y="238" width="200" height="12" rx="4" fill="url(#accentBar)"/>
    <path d="M250 244 H360" stroke="#A78BFA" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
    <circle cx="372" cy="244" r="4" fill="#A78BFA"/>
  </g>
</svg>
