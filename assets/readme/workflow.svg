<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Как это работает</title>
  <desc id="desc">Три шага: копируете, история сохраняется локально, вставляете горячей клавишей.</desc>
  <rect width="1200" height="320" rx="26" fill="#0B0C10"/>
  <rect x="1" y="1" width="1198" height="318" rx="25" fill="none" stroke="#2A2E3A"/>
  <text x="56" y="58" fill="#8B90A0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" letter-spacing="2.5">FLOW</text>
  <text x="56" y="96" fill="#F4F5F7" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="32" font-weight="700">Копируете - история - вставка</text>
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <g transform="translate(56 130)">
      <rect width="320" height="140" rx="18" fill="#14161C" stroke="#2A2E3A"/>
      <circle cx="36" cy="36" r="18" fill="#7B6CFF"/>
      <text x="36" y="42" text-anchor="middle" fill="#F4F5F7" font-size="20" font-weight="700">1</text>
      <text x="68" y="42" fill="#F4F5F7" font-size="22" font-weight="600">Копируете</text>
      <text x="28" y="84" fill="#C8CCD8" font-size="18">Текст, изображение</text>
      <text x="28" y="112" fill="#C8CCD8" font-size="18">или файл - как обычно</text>
    </g>
    <path d="M396 200 H448" stroke="#4A5166" stroke-width="3" stroke-linecap="round"/>
    <path d="M436 188 L452 200 L436 212" fill="none" stroke="#4A5166" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(468 130)">
      <rect width="320" height="140" rx="18" fill="#14161C" stroke="#2A2E3A"/>
      <circle cx="36" cy="36" r="18" fill="#7B6CFF"/>
      <text x="36" y="42" text-anchor="middle" fill="#F4F5F7" font-size="20" font-weight="700">2</text>
      <text x="68" y="42" fill="#F4F5F7" font-size="22" font-weight="600">Сохраняется</text>
      <text x="28" y="84" fill="#C8CCD8" font-size="18">Локально на диске</text>
      <text x="28" y="112" fill="#3DDC97" font-size="18">без облака и аккаунта</text>
    </g>
    <path d="M808 200 H860" stroke="#4A5166" stroke-width="3" stroke-linecap="round"/>
    <path d="M848 188 L864 200 L848 212" fill="none" stroke="#4A5166" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(880 130)">
      <rect width="264" height="140" rx="18" fill="#14161C" stroke="#7B6CFF" stroke-opacity="0.65"/>
      <circle cx="36" cy="36" r="18" fill="#7B6CFF"/>
      <text x="36" y="42" text-anchor="middle" fill="#F4F5F7" font-size="20" font-weight="700">3</text>
      <text x="68" y="42" fill="#F4F5F7" font-size="22" font-weight="600">Вставляете</text>
      <text x="28" y="84" fill="#C8CCD8" font-size="18">Панель или цикл</text>
      <text x="28" y="112" fill="#A78BFA" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">Cmd+Opt+V</text>
    </g>
  </g>
</svg>
